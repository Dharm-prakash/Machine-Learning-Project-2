<svg width="900" height="1100" viewBox="0 0 900 1100" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Arrow -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666"></path>
    </marker>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#aaa"></feDropShadow>
    </filter>
  </defs>

  <style>
    .box {
      rx:14; ry:14;
      stroke:#ccc;
      stroke-width:1;
      filter:url(#shadow);
    }
    .title {
      font-family: Arial, sans-serif;
      font-size:16px;
      font-weight:bold;
      fill:#333;
    }
    .desc {
      font-family: Arial, sans-serif;
      font-size:13px;
      fill:#555;
    }
    .arrow {
      stroke:#888;
      stroke-width:2;
      marker-end:url(#arrow);
    }
  </style>

  <!-- Function-like repeated structure manually -->

  <!-- STEP 1 -->
  <rect x="150" y="30" width="600" height="70" fill="#d6ecff" class="box"></rect>
  <text x="180" y="55" class="title">Step 1 — Library setup &amp; data loading</text>
  <text x="180" y="75" class="desc">lightgbm, xgboost, pandas, numpy, matplotlib, seaborn</text>

  <line x1="450" y1="100" x2="450" y2="130" class="arrow"></line>

  <!-- STEP 2 -->
  <rect x="150" y="130" width="600" height="70" fill="#d9f7e6" class="box"></rect>
  <text x="180" y="155" class="title">Step 2 — Exploratory Data Analysis (EDA)</text>
  <text x="180" y="175" class="desc">Distribution · Missing values · Visualization</text>

  <line x1="450" y1="200" x2="450" y2="230" class="arrow"></line>

  <!-- STEP 3 -->
  <rect x="150" y="230" width="600" height="70" fill="#e6e0ff" class="box"></rect>
  <text x="180" y="255" class="title">Step 3 — Feature selection &amp; labeling</text>
  <text x="180" y="275" class="desc">8 features · Binary classification</text>

  <line x1="450" y1="300" x2="450" y2="330" class="arrow"></line>

  <!-- STEP 4 -->
  <rect x="150" y="330" width="600" height="70" fill="#f5e6cc" class="box"></rect>
  <text x="180" y="355" class="title">Step 4 — Missing value imputation</text>
  <text x="180" y="375" class="desc">Continuous → Mean · Categorical → Median</text>

  <line x1="450" y1="400" x2="450" y2="430" class="arrow"></line>

  <!-- STEP 5 -->
  <rect x="150" y="430" width="600" height="70" fill="#f2dede" class="box"></rect>
  <text x="180" y="455" class="title">Step 5 — StandardScaler normalization</text>
  <text x="180" y="475" class="desc">Mean = 0 · Std = 1 · avoids bias</text>

  <line x1="450" y1="500" x2="450" y2="530" class="arrow"></line>

  <!-- STEP 6 -->
  <rect x="150" y="530" width="600" height="70" fill="#e2f0d9" class="box"></rect>
  <text x="180" y="555" class="title">Step 6 — SMOTE oversampling</text>
  <text x="180" y="575" class="desc">Balances dataset · synthetic minority samples</text>

  <line x1="450" y1="600" x2="450" y2="630" class="arrow"></line>

  <!-- STEP 7 -->
  <rect x="150" y="630" width="600" height="70" fill="#ddebf7" class="box"></rect>
  <text x="180" y="655" class="title">Step 7 — Bayesian visualization</text>
  <text x="180" y="675" class="desc">Prior probabilities · Gaussian likelihood curves</text>

  <line x1="450" y1="700" x2="450" y2="730" class="arrow"></line>

  <!-- STEP 8 -->
  <rect x="150" y="730" width="600" height="70" fill="#e6e0ff" class="box"></rect>
  <text x="180" y="755" class="title">Step 8 — Gaussian Naive Bayes + CV</text>
  <text x="180" y="775" class="desc">Stratified K-Fold · Accuracy · Recall · F1 · AUC</text>

  <line x1="450" y1="800" x2="450" y2="830" class="arrow"></line>

  <!-- STEP 9 -->
  <rect x="150" y="830" width="600" height="70" fill="#d9ead3" class="box"></rect>
  <text x="180" y="855" class="title">Step 9 — Evaluation &amp; comparison</text>
  <text x="180" y="875" class="desc">Confusion Matrix · ROC Curve · Model comparison</text>

</svg>